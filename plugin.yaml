name: vkontakte-platform
label: VKontakte
kind: platform
version: 1.0.0
description: >
  VKontakte (VK) community bot adapter for Hermes Agent.
  Connects to a VK community bot via Long Poll API and relays
  messages between VK users and the Hermes agent.
author: community
# Tell the Gateway which env vars carry the allowlist so authz_mixin.py
# can gate messages before they reach the adapter.
allowed_users_env: VK_ALLOWED_USERS
allow_all_env: VK_ALLOW_ALL_USERS
cron_deliver_env_var: VK_HOME_CHANNEL
requires_env:
  - name: VK_TOKEN
    description: "VK Community API token with messages permission (Manage community → API usage → Create token)"
    prompt: "VK Community token"
    password: true
optional_env:
  - name: VK_ALLOWED_USERS
    description: "Comma-separated VK user IDs allowed to chat with the bot (empty = allow all)"
    prompt: "Allowed user IDs (comma-separated)"
    password: false
  - name: VK_HOME_CHANNEL
    description: "VK peer_id for cron/notification delivery (user_id for DM, 2000000001+ for group chat)"
    prompt: "Home channel peer_id"
    password: false
  - name: VK_API_VERSION
    description: "VK API version (default: 5.199)"
    prompt: "API version"
    password: false
  - name: VK_ALLOW_ALL_USERS
    description: "Allow all users to chat (dev/test only, set to 1 or true)"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: VK_POLLING_TIMEOUT
    description: "Long Poll timeout in seconds (default: 25)"
    prompt: "Polling timeout"
    password: false
